version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "2026:2026"
    command: |
      sh -c '
      cat > /etc/nginx/nginx.conf << "NGINXCONF"
      events { worker_connections 1024; }
      http {
        upstream frontend { server frontend:3000; }
        upstream gateway { server gateway:8001; }
        server {
          listen 2026;
          client_max_body_size 100M;
          location /api/langgraph/ {
            rewrite ^/api/langgraph/(.*) /api/$$1 break;
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 600s;
          }
          location /api/ {
            proxy_pass http://gateway;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600;
            proxy_buffering off;
          }
          location / {
            proxy_pass http://frontend;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "upgrade";
          }
        }
      }
      NGINXCONF
      nginx -g "daemon off;"
      '
    depends_on:
      - frontend
      - gateway
    networks:
      - deer-flow
    restart: unless-stopped

  frontend:
    image: sourabhjagga/deer-flow-frontend:latest
    container_name: deer-flow-frontend
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
    networks:
      - deer-flow
    restart: unless-stopped

  gateway:
    image: sourabhjagga/deer-flow-backend:latest
    container_name: deer-flow-gateway
    entrypoint: ["/bin/sh", "/app/setup-skills.sh"]
    volumes:
      - ./setup-skills.sh:/app/setup-skills.sh:ro
      - deer-flow-data:/app/backend/.deer-flow
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host:ro
    environment:
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_SKILLS_PATH=/mnt/skills
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY:-placeholder}
      - NINE_ROUTER_BASE_URL=${NINE_ROUTER_BASE_URL:-http://9router:9000/v1}
      - NINE_ROUTER_MODEL=${NINE_ROUTER_MODEL:-gpt-4}
    networks:
      - deer-flow
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  deer-flow-data:
    driver: local

networks:
  deer-flow:
    driver: bridge
